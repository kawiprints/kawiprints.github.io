<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: sans-serif;
        }

        .site-header {
            display: flex;
            align-items: center;
            padding: 40px 120px;
            /* static size */
            position: fixed;
            top: 0;
            width: 100%;
            background: rgb(230, 230, 230);
            z-index: 1000;
            box-sizing: border-box;
        }

        main {
            padding-top: 110px;
            /* enough space so content isn't covered */
        }

        .logo a {
            margin-left: 40px;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 700;
            color: #000;
        }

        .nav {
            display: flex;
            gap: 80px;
            flex: 1;
            justify-content: center;
            margin-left: 40px;
            white-space: nowrap;
        }

        .nav a {
            text-decoration: none;
            font-size: 1rem;
            color: #333;
            font-weight: 500;
        }

        section {
            min-height: 100vh;
            padding: 20px;
            scroll-margin-top: 110px;
        }
    </style>
</head>

<body>

    <header class="site-header">
        <div class="logo">
            <a href="#home">My Company</a>
        </div>

        <nav class="nav">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main>
        <section id="home">Home content here</section>
        <section id="about">About content here</section>
        <section id="portfolio">Portfolio content here</section>
        <section id="contact">Contact content here</section>
    </main>

</body>

</html>
