<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio / Company</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/kawiprints/kawiprints.github.io@latest/_css/style.css">

    <style>
        .portfolio-item {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .portfolio-image img {
            max-width: 300px;
            height: auto;
            display: block;
        }

        .metadata {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metadata span strong {
            font-style: normal;
            /* ensures labels are NOT italic */
        }

        .metadata span em {
            font-style: italic;
            /* ensures values ARE italic */
        }
    </style>
</head>

<body>
    <div id="header"></div>

    <script>
        fetch("https://cdn.jsdelivr.net/gh/kawiprints/kawiprints.github.io@latest/_shared/header.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("header").innerHTML = data;
            });
    </script>


    <main>
        <div class="portfolio-item">
            <div class="portfolio-image">
                <img src="https://www.animationfactory.com/thumbs.php?f=/046/batch_91/b4_dog0002_tnb.png" alt="Hello"
                    title="Hello2">
            </div>

            <div class="portfolio-content">
                <h2>Project Title</h2>

                <p>
                    This is where your project description goes. You can talk about what the project is,
                    what tools you used, what problems you solved, or anything else relevant.
                </p>

                <div class="metadata">
                    <span><strong>Date:</strong> <em>January 2024</em></span>
                    <span><strong>Location:</strong> <em>Remote / USA</em></span>
                    <span><strong>Tools:</strong> <em>HTML, CSS, JS</em></span>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
